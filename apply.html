<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>暖爪之家 - 领养申请</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="apply-container">
    <div class="apply-box">
        <h1>领养申请表</h1>

        <input type="text" id="applyName" placeholder="申请人姓名">
        <input type="text" id="applyPhone" placeholder="联系电话">
        <input type="text" id="applyPet" placeholder="申请领养宠物">

        <textarea id="applyReason" placeholder="请填写领养理由"></textarea>

        <button class="login-btn" onclick="submitApplication()">提交申请</button>

        <div class="extra-links">
            <a href="index.html">返回首页</a>
        </div>
    </div>
</div>

<script src="main.js"></script>
</body>
</html>
