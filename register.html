<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暖爪之家 - 注册</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-page">

    <!-- 左侧欢迎区 -->
    <div class="left-panel">
        <h1>暖爪之家</h1>
        <p>让爱与陪伴，从领养开始</p>
    </div>

    <!-- 右侧注册区 -->
    <div class="right-panel">
        <div class="login-box">
            <h2>注册账号</h2>

            <input type="text" id="regUsername" placeholder="请输入用户名">
            <input type="text" id="regPhone" placeholder="请输入手机号">
            <input type="email" id="regEmail" placeholder="请输入邮箱">
            <input type="password" id="regPassword" placeholder="请输入密码">
            <input type="password" id="regConfirmPassword" placeholder="请确认密码">

            <button class="login-btn" onclick="register()">立即注册</button>

            <div class="extra-links">
                <a href="login.html">返回登录</a>
            </div>
        </div>
    </div>

</div>

<script src="main.js"></script>
</body>
</html>
